<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Monitor Dashboard | Supabase Powered</title>
    <meta name="description" content="Premium monitoring dashboard for scraped Facebook group posts stored in Supabase.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="logo-container">
                <i data-lucide="facebook" class="logo-icon"></i>
                <h1>Facebook Group Monitor</h1>
            </div>
            <div class="status-badge" id="sourceBadge">
                <i data-lucide="database" class="status-icon"></i>
                <span id="sourceText">Connecting...</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Analytics Overview -->
            <section class="analytics-grid">
                <div class="stat-card glass-card">
                    <div class="stat-header">
                        <span class="stat-title">Total Posts</span>
                        <i data-lucide="file-text" class="stat-icon blue"></i>
                    </div>
                    <div class="stat-value" id="statTotalPosts">0</div>
                    <div class="stat-subtitle">Across monitored groups</div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-header">
                        <span class="stat-title">Total Likes</span>
                        <i data-lucide="thumbs-up" class="stat-icon green"></i>
                    </div>
                    <div class="stat-value" id="statTotalLikes">0</div>
                    <div class="stat-subtitle">User engagement</div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-header">
                        <span class="stat-title">Total Comments</span>
                        <i data-lucide="message-square" class="stat-icon yellow"></i>
                    </div>
                    <div class="stat-value" id="statTotalComments">0</div>
                    <div class="stat-subtitle">Active discussions</div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-header">
                        <span class="stat-title">Total Shares</span>
                        <i data-lucide="share-2" class="stat-icon purple"></i>
                    </div>
                    <div class="stat-value" id="statTotalShares">0</div>
                    <div class="stat-subtitle">Viral reach</div>
                </div>
            </section>

            <!-- Filters & Search Bar -->
            <section class="controls-section glass-card">
                <div class="search-box">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Search post body content...">
                </div>
                <div class="filter-box">
                    <div class="filter-group">
                        <label for="groupFilter"><i data-lucide="users"></i> Group</label>
                        <select id="groupFilter">
                            <option value="All">All Groups</option>
                            <option value="Group 658561818123997">Group 658561818123997</option>
                            <option value="Group 644861357496091">Group 644861357496091</option>
                            <option value="Group 511463069896512">Group 511463069896512</option>
                            <option value="Flats and Flatmates Ahmedabad">Flats and Flatmates Ahmedabad</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="dateFilter"><i data-lucide="calendar"></i> Date</label>
                        <input type="date" id="dateFilter">
                    </div>
                    <button id="resetFiltersBtn" class="btn-secondary">
                        <i data-lucide="rotate-ccw"></i> Reset
                    </button>
                </div>
            </section>

            <!-- Posts Feed -->
            <section class="posts-section">
                <div class="posts-header">
                    <h2>Latest Scraped Posts</h2>
                    <div class="pagination-info">
                        Showing page <span id="currentPage">1</span> of <span id="totalPages">1</span>
                    </div>
                </div>

                <div id="postsGrid" class="posts-grid">
                    <!-- Posts injected dynamically via JS -->
                    <div class="loading-state">
                        <i data-lucide="loader-2" class="spinner"></i>
                        <p>Loading posts from database...</p>
                    </div>
                </div>

                <!-- Pagination Controls -->
                <div class="pagination-controls">
                    <button id="prevPageBtn" class="btn-pagination" disabled>
                        <i data-lucide="chevron-left"></i> Previous
                    </button>
                    <span id="paginationNumbers" class="pagination-numbers"></span>
                    <button id="nextPageBtn" class="btn-pagination" disabled>
                        Next <i data-lucide="chevron-right"></i>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Image Preview Modal -->
    <div id="imageModal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content glass-card">
            <button id="closeModalBtn" class="close-btn"><i data-lucide="x"></i></button>
            <img id="modalImage" src="" alt="Full preview">
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
