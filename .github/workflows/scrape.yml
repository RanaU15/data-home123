name: Automated Facebook Scraper

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps

    - name: Restore Facebook Session
      env:
        SESSION_DATA: ${{ secrets.FACEBOOK_SESSION }}
      run: node -e "require('fs').writeFileSync('facebook-session.json', process.env.SESSION_DATA)"

    - name: Verify Session File
      run: |
        echo "Size: $(wc -c < facebook-session.json) bytes"
        echo "Preview: $(head -c 80 facebook-session.json)"
        echo "Valid JSON: $(node -e 'JSON.parse(require("fs").readFileSync("facebook-session.json","utf8")); console.log("YES")' 2>&1)"

    - name: Run Facebook Scraper
      env:
        CI: true
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        FB_EMAIL: ${{ secrets.FB_EMAIL }}
        FB_PASSWORD: ${{ secrets.FB_PASSWORD }}
      run: node scraper.js --single-run
